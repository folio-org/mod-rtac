stages:
  - name: Build
    steps:
      - runScriptConfig:
          image: maven:3-openjdk-11
          shellScript: mvn package -DskipTests
  - name: Build Docker with DIND
    steps:
      - publishImageConfig:
          dockerfilePath: ./Dockerfile
          buildContext: .
          tag: docker.dev.folio.org/mod-rtac:core-functional-latest
          pushRemote: true
          registry: docker.dev.folio.org
  - name: Deploy
    steps:
      - applyAppConfig:
          catalogTemplate: p-9mwdx:core-functional-helmcharts-mod-rtac
          version: 0.1.9
          answers:
            image.repository: docker.dev.folio.org/mod-rtac
            image.tag: core-functional-latest
            postJob.enabled: true
          targetNamespace: core-functional
          name: mod-rtac
timeout: 60
notification: {}
